name: workflow-check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  workflow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Initialize trusted default branch ref
        run: git remote set-head origin --auto
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install test dependencies
        run: python3 -m pip install pytest
      - name: Check workflow pack and spec packets
        run: python3 checks/check_workflow.py --repo . --all-specs
      - name: Evaluate adoption matrix
        run: python3 evaluate.py --repo . --spec-dir specs/GH13 --format json
      - name: Run tests
        run: python3 -m pytest -q
      - name: Check whitespace
        run: git diff --check
